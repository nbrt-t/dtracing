spring.application.name=price-tiering
server.port=8092

# ── Disable OTLP export — telemetry collected by sidecar ──────
management.otlp.metrics.export.enabled=false
management.otlp.tracing.export.enabled=false

# ── Aeron IPC subscriber (MidPriceBook from MidPricer) ────────
aeron.mid-price-book.dir=/dev/shm/aeron/driver
aeron.mid-price-book.channel=aeron:ipc
aeron.mid-price-book.stream-id=1003

# ── Spread matrix ─────────────────────────────────────────────
# Half-spreads in Decimal5 mantissa (10 = 0.00010 = 1 pip)
# Tier 1 = tightest (best clients), Tier 4 = widest
price-tiering.spread.tier-count=4
price-tiering.spread.default-half-spreads=10,20,35,50

# ── Per-pair overrides (uncomment / add as needed) ────────────
price-tiering.spread.pair-half-spreads.EURUSD=8,15,25,40
price-tiering.spread.pair-half-spreads.GBPUSD=10,18,30,45
price-tiering.spread.pair-half-spreads.USDJPY=6,12,20,30
price-tiering.spread.pair-half-spreads.EURGBP=12,22,38,55

# ── Aeron IPC trace publisher (TraceSpan → trace channel) ─────
aeron.trace.dir=/dev/shm/aeron/driver
aeron.trace.channel=aeron:ipc
aeron.trace.stream-id=2001