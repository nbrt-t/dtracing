spring.application.name=market-data-handler

# ── Disable OTLP export — telemetry collected by sidecar ──────
management.otlp.metrics.export.enabled=false
management.otlp.tracing.export.enabled=false

# ── Shared UDP feed defaults ───────────────────────────────────
market-data.udp.bind-address=0.0.0.0
market-data.udp.buffer-size=1500

# ── Aeron IPC publisher (FxMarketData → BookBuilder) ──────────
aeron.market-data.dir=/dev/shm/aeron/driver
aeron.market-data.channel=aeron:ipc
aeron.market-data.stream-id=1001

# ── Aeron IPC trace publisher (TraceSpan → trace channel) ─────
aeron.trace.dir=/dev/shm/aeron/driver
aeron.trace.channel=aeron:ipc
aeron.trace.stream-id=2001