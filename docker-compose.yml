services:

  aeron-media-driver:
    build:
      context: .
      target: aeron-media-driver
    container_name: aeron-media-driver
    ipc: shareable
    volumes:
      - aeron-dir:/dev/shm/aeron
    networks:
      - dtracing

  mdh-euronext:
    build:
      context: .
      target: market-data-handler
    container_name: mdh-euronext
    ipc: service:aeron-media-driver
    environment:
      SPRING_PROFILES_ACTIVE: euronext
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
    volumes:
      - aeron-dir:/dev/shm/aeron
    ports:
      - "8081:8081"
      - "9001:9001/udp"
    networks:
      - dtracing
    depends_on:
      - aeron-media-driver

  mdh-ebs:
    build:
      context: .
      target: market-data-handler
    container_name: mdh-ebs
    ipc: service:aeron-media-driver
    environment:
      SPRING_PROFILES_ACTIVE: ebs
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
    volumes:
      - aeron-dir:/dev/shm/aeron
    ports:
      - "8082:8082"
      - "9002:9002/udp"
    networks:
      - dtracing
    depends_on:
      - aeron-media-driver

  mdh-fenics:
    build:
      context: .
      target: market-data-handler
    container_name: mdh-fenics
    ipc: service:aeron-media-driver
    environment:
      SPRING_PROFILES_ACTIVE: fenics
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
    volumes:
      - aeron-dir:/dev/shm/aeron
    ports:
      - "8083:8083"
      - "9003:9003/udp"
    networks:
      - dtracing
    depends_on:
      - aeron-media-driver

  book-builder:
    build:
      context: .
      target: book-builder
    container_name: book-builder
    ipc: service:aeron-media-driver
    environment:
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
    volumes:
      - aeron-dir:/dev/shm/aeron
    ports:
      - "8090:8090"
    networks:
      - dtracing
    depends_on:
      - aeron-media-driver
      - mdh-euronext
      - mdh-ebs
      - mdh-fenics

  mid-pricer:
    build:
      context: .
      target: mid-pricer
    container_name: mid-pricer
    ipc: service:aeron-media-driver
    environment:
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
    volumes:
      - aeron-dir:/dev/shm/aeron
    ports:
      - "8091:8091"
    networks:
      - dtracing
    depends_on:
      - aeron-media-driver
      - book-builder

  price-tiering:
    build:
      context: .
      target: price-tiering
    container_name: price-tiering
    ipc: service:aeron-media-driver
    environment:
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
    volumes:
      - aeron-dir:/dev/shm/aeron
    ports:
      - "8092:8092"
    networks:
      - dtracing
    depends_on:
      - aeron-media-driver
      - mid-pricer

  trace-collector:
    build:
      context: .
      target: trace-collector
    container_name: trace-collector
    ipc: service:aeron-media-driver
    environment:
      JAVA_TOOL_OPTIONS: >-
        -Dotlp.endpoint=http://tempo:4317
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
    volumes:
      - aeron-dir:/dev/shm/aeron
    networks:
      - dtracing
    depends_on:
      - aeron-media-driver
      - tempo

  # ── Observability ──────────────────────────────────────────────────────────

  tempo:
    image: grafana/tempo:2.10.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./grafana-tempo/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "14268:14268" # Jaeger HTTP
    networks:
      - dtracing

  grafana:
    image: grafana/grafana:latest
    user: "472"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-tempo/provisioning:/etc/grafana/provisioning
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - tempo
    networks:
      - dtracing

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    volumes:
      - ./grafana-tempo/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - dtracing

  # ── Simulator ──────────────────────────────────────────────────────────────

  simulator:
    profiles: ["simulator"]
    build:
      context: .
      target: simulator
    container_name: simulator
    environment:
      SPRING_PROFILES_ACTIVE: docker
    volumes:
      - aeron-dir:/dev/shm/aeron
    networks:
      - dtracing

volumes:
  aeron-dir:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=64m
  tempo-data:
  grafana-data:

networks:
  dtracing:
    name: dtracing