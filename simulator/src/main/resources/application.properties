spring.application.name=simulator
spring.main.web-application-type=none

# ── Logging ───────────────────────────────────────────────────
logging.pattern.correlation=

# ── Disable OTLP export — telemetry collected by sidecar ──────
management.otlp.metrics.export.enabled=false
management.otlp.tracing.export.enabled=false

# ── Replay speed: 1.0 = real-time, 0.1 = 10x slower, 10.0 = 10x faster ──
simulator.speed-multiplier=1.0

# ── Aeron IPC shared media driver directory ────────────────────
simulator.aeron-dir=/dev/shm/aeron/driver

# ── EURONEXT feed → stream 3001 ──
simulator.feeds[0].ecn=EURONEXT
simulator.feeds[0].file=simulator/data/euronext_feed.csv
simulator.feeds[0].stream-id=3001

# ── EBS feed → stream 3002 ──
simulator.feeds[1].ecn=EBS
simulator.feeds[1].file=simulator/data/ebs_feed.csv
simulator.feeds[1].stream-id=3002

# ── FENICS feed → stream 3003 ──
simulator.feeds[2].ecn=FENICS
simulator.feeds[2].file=simulator/data/fenics_feed.csv
simulator.feeds[2].stream-id=3003
