spring.application.name=mid-pricer
server.port=8091

# ── Logging ───────────────────────────────────────────────────
logging.pattern.correlation=

# ── Disable OTLP export — telemetry collected by sidecar ──────
management.otlp.metrics.export.enabled=false
management.otlp.tracing.export.enabled=false

# ── Aeron IPC subscriber (VenueOrderBook from BookBuilder) ────
aeron.venue-order-book.dir=/dev/shm/aeron/driver
aeron.venue-order-book.channel=aeron:ipc
aeron.venue-order-book.stream-id=1002

# ── Aeron IPC publisher (MidPriceBook → PriceTiering) ─────────
aeron.mid-price-book.dir=/dev/shm/aeron/driver
aeron.mid-price-book.channel=aeron:ipc
aeron.mid-price-book.stream-id=1003

# ── Aeron IPC trace publisher (TraceSpan → trace channel) ─────
aeron.trace.dir=/dev/shm/aeron/driver
aeron.trace.channel=aeron:ipc
aeron.trace.stream-id=2001